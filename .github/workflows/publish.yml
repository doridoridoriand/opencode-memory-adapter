name: Publish to npm

on:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install npm CLI for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          NORMALIZED_TAG="${RELEASE_TAG#v}"

          if [ "$NORMALIZED_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Scan tracked files for sensitive content
        run: npm run scan:sensitive

      - name: Audit npm package contents
        run: npm run audit:package

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run local E2E suite
        run: npm run test:e2e

      - name: Dry-run publish
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package to npm
        if: github.event_name == 'release'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
